<meta charset="utf-8">
<style>
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    background: #0a0a0a;
    color: white;
  }
  .scene { position: absolute; inset: 0; opacity: 0; pointer-events: none; }
  .clip-area {
    position: absolute; top: 420px; left: 0; width: 1080px; height: 1080px;
    overflow: hidden;
  }
  .clip-area video {
    width: 100%; height: 100%; object-fit: cover;
  }
  /* 静止画エリア */
  .clip-area img {
    width: 100%; height: 100%; object-fit: cover;
  }
  /* テキストエリア上部 */
  .text-top {
    position: absolute; top: 0; left: 0; right: 0; height: 420px;
    padding: 60px 60px 30px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  /* テキストエリア下部 */
  .text-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 420px;
    padding: 30px 60px 60px;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  /* スタッツカード */
  .stat-card {
    display: flex; gap: 24px;
    margin-top: 20px;
  }
  .stat-item {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    border: 2px solid rgba(255,255,255,0.08);
  }
  .stat-value { font-size: 56px; font-weight: 900; }
  .stat-label { font-size: 22px; color: #94a3b8; margin-top: 4px; }
  /* カラーライン */
  .color-line {
    position: absolute; top: 418px; left: 0; right: 0; height: 4px;
    transform: scaleX(0); transform-origin: left;
  }
  /* キャッチフレーズ */
  .catchphrase {
    font-size: 28px; color: #ccc; font-style: italic;
    margin-top: 12px; opacity: 0;
  }
  /* ページネーション */
  .pagination {
    position: absolute; bottom: 80px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px;
  }
  .page-dot {
    height: 10px; border-radius: 5px;
    background: #333; transition: all 0.3s;
  }
</style>
