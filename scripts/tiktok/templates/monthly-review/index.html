<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
.comp{width:1080px;height:1920px;position:relative;overflow:hidden;background:#0a0a0a}
.layer{position:absolute;width:1080px;height:1920px;top:0;left:0}

/* S1: Hook */
.s1{z-index:10}
.s1 .bg{position:absolute;width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 50%,#2d1a00 0%,#0a0a0a 65%)}
.s1 .icon{position:absolute;left:0;top:620px;width:1080px;text-align:center;font-size:120px;opacity:0}
.s1 .hook{position:absolute;left:60px;top:780px;width:960px;text-align:center;font:900 56px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;opacity:0;line-height:1.4}
.s1 .sub{position:absolute;left:0;top:940px;width:1080px;text-align:center;font:700 38px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fbbf24;opacity:0;white-space:nowrap}

/* S2: Ranking Table */
.s2{z-index:20}
.s2 .bg{position:absolute;width:1080px;height:1920px;background:#0a0a0a;opacity:0}
.s2 .stitle{position:absolute;left:0;top:320px;width:1080px;text-align:center;font:900 48px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;opacity:0;white-space:nowrap}
.s2 .ssub{position:absolute;left:0;top:390px;width:1080px;text-align:center;font:500 28px 'Hiragino Kaku Gothic ProN',sans-serif;color:rgba(255,255,255,0.4);opacity:0;white-space:nowrap}
.mrow{position:absolute;left:60px;width:960px;height:150px;border-radius:20px;opacity:0}
.mrow .rank{position:absolute;left:16px;top:30px;width:80px;text-align:center;font:900 48px 'Hiragino Kaku Gothic ProN',sans-serif;white-space:nowrap}
.mrow .mimg{position:absolute;left:100px;top:20px;width:110px;height:110px;border-radius:55px;overflow:hidden;border:3px solid}
.mrow .mimg img{width:100%;height:100%;object-fit:cover}
.mrow .mname{position:absolute;left:228px;top:28px;font:900 40px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;white-space:nowrap}
.mrow .mstats{position:absolute;left:228px;top:80px;font:500 26px 'Hiragino Kaku Gothic ProN',sans-serif;color:rgba(255,255,255,0.5);white-space:nowrap}
.mrow .mscore{position:absolute;right:20px;top:35px;font:900 52px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;white-space:nowrap}
.mrow .munit{position:absolute;right:20px;top:92px;font:500 22px 'Hiragino Kaku Gothic ProN',sans-serif;color:rgba(255,255,255,0.4);white-space:nowrap;text-align:right}

/* S3: MVP */
.s3{z-index:30}
.s3 .bg{position:absolute;width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 45%,#3d2a00 0%,#0a0a0a 60%);opacity:0}
.s3 .trophy{position:absolute;left:0;top:420px;width:1080px;text-align:center;font-size:140px;opacity:0}
.s3 .mvplbl{position:absolute;left:0;top:600px;width:1080px;text-align:center;font:900 44px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fbbf24;opacity:0;white-space:nowrap}
.s3 .mvpimg{position:absolute;left:340px;top:680px;width:400px;height:400px;border-radius:200px;overflow:hidden;border:8px solid #fbbf24;opacity:0;box-shadow:0 0 80px rgba(251,191,36,0.4)}
.s3 .mvpimg img{width:100%;height:100%;object-fit:cover}
.s3 .mvpname{position:absolute;left:0;top:1120px;width:1080px;text-align:center;font:900 72px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;opacity:0;white-space:nowrap;text-shadow:0 0 40px rgba(251,191,36,0.5)}
.s3 .mvpstat{position:absolute;left:0;top:1220px;width:1080px;text-align:center;font:700 36px 'Hiragino Kaku Gothic ProN',sans-serif;color:rgba(255,255,255,0.6);opacity:0;white-space:nowrap}

/* S4: CTA */
.s4{z-index:40}
.s4 .bg{position:absolute;width:1080px;height:1920px;background:linear-gradient(180deg,#0a0a0a 30%,#2d1a00 100%);opacity:0}
.s4 .c1{position:absolute;left:0;top:740px;width:1080px;text-align:center;font:900 56px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;opacity:0;white-space:nowrap}
.s4 .c2{position:absolute;left:0;top:840px;width:1080px;text-align:center;font:500 36px 'Hiragino Kaku Gothic ProN',sans-serif;color:rgba(255,255,255,0.6);opacity:0;white-space:nowrap}
.s4 .bt{position:absolute;left:140px;top:950px;width:800px;height:120px;background:#d97706;border-radius:60px;text-align:center;line-height:120px;font:900 44px 'Hiragino Kaku Gothic ProN',sans-serif;color:#fff;opacity:0;white-space:nowrap;box-shadow:0 0 60px rgba(217,119,6,0.5)}
.s4 .ar{position:absolute;left:0;top:1120px;width:1080px;text-align:center;font:400 60px sans-serif;color:#fbbf24;opacity:0}
.wm{position:absolute;right:36px;bottom:50px;z-index:100;font:700 28px 'Hiragino Kaku Gothic ProN',sans-serif;color:rgba(255,255,255,0.2);white-space:nowrap}
</style>
</head>
<body>
<div class="comp" data-composition-id="monthly" data-width="1080" data-height="1920" data-duration="30" data-start="0">
<div class="layer s1" id="s1"><div class="bg"></div>
<div class="icon" id="icon">🏆</div>
<div class="hook" id="hook">{{MONTH}}の\nAI予想家成績発表！</div>
<div class="sub" id="sub">{{MONTH}} 全レース集計</div>
</div>
<div class="layer s2" id="s2"><div class="bg" id="s2b"></div>
<div class="stitle" id="s2t">月間ランキング</div>
<div class="ssub" id="s2s">3着内率でランク付け</div>
{{#RANKING_ROWS}}
</div>
<div class="layer s3" id="s3"><div class="bg" id="s3b"></div>
<div class="trophy" id="trophy">🏆</div>
<div class="mvplbl" id="mvplbl">{{MONTH}} MVP</div>
<div class="mvpimg" id="mvpimg"><img src="{{MVP_IMAGE}}" alt=""></div>
<div class="mvpname" id="mvpname">{{MVP_NAME}}</div>
<div class="mvpstat" id="mvpstat">{{MVP_STAT}}</div>
</div>
<div class="layer s4" id="s4"><div class="bg" id="s4b"></div>
<div class="c1" id="c1">来月も予想をチェック</div>
<div class="c2" id="c2">プロフィールのリンクから</div>
<div class="bt" id="bt">フォローで毎週受け取る</div>
<div class="ar" id="ar">▼</div>
</div>
<div class="wm">ゲートイン！AI競馬予想家</div>
</div>
<script>
(function(){
var t=gsap.timeline({paused:true});
// S1 (0-3.5s)
t.to("#icon",{opacity:1,scale:1,duration:0.4,ease:"back.out(1.5)"},0.2).from("#icon",{scale:0.3,duration:0.4},0.2)
.to("#hook",{opacity:1,duration:0.5},0.6).from("#hook",{y:40,duration:0.5},0.6)
.to("#sub",{opacity:1,duration:0.3},1.4);
t.to("#s1",{opacity:0,duration:0.3},3.2).to("#s2b",{opacity:1,duration:0.3},3.3);
// S2 (3.5-18s)
t.to("#s2t",{opacity:1,duration:0.3},3.5).from("#s2t",{y:20,duration:0.3},3.5)
.to("#s2s",{opacity:1,duration:0.2},3.9);
{{#RANKING_ANIMATIONS}}
// S2→S3
t.to(["#s2b","#s2t","#s2s"{{#RANK_FADE_IDS}}],{opacity:0,duration:0.3},17.5).to("#s3b",{opacity:1,duration:0.3},17.6);
// S3: MVP (18-24s)
t.to("#trophy",{opacity:1,scale:1,duration:0.5,ease:"elastic.out(1,0.5)"},18.0).from("#trophy",{scale:0.2,duration:0.5},18.0)
.to("#mvplbl",{opacity:1,duration:0.3},18.6)
.to("#mvpimg",{opacity:1,duration:0.5},19.0).from("#mvpimg",{scale:0.5,duration:0.5,ease:"back.out(1.5)"},19.0)
.to("#mvpname",{opacity:1,duration:0.5,ease:"power3.out"},19.8).from("#mvpname",{y:40,scale:0.9,duration:0.5},19.8)
.to("#mvpstat",{opacity:1,duration:0.3},20.5);
// S3→S4
t.to(["#s3b","#trophy","#mvplbl","#mvpimg","#mvpname","#mvpstat"],{opacity:0,duration:0.3},23.5).to("#s4b",{opacity:1,duration:0.4},23.6);
// S4 (24-30s)
t.to("#c1",{opacity:1,duration:0.4},24.0).from("#c1",{y:40,duration:0.4},24.0)
.to("#c2",{opacity:1,duration:0.3},24.6)
.to("#bt",{opacity:1,scale:1,duration:0.4,ease:"back.out(1.5)"},25.2).from("#bt",{scale:0.8,duration:0.4},25.2)
.to("#bt",{boxShadow:"0 0 100px rgba(217,119,6,0.6)",duration:0.6,repeat:2,yoyo:true},26.0)
.to("#ar",{opacity:1,duration:0.3},25.6).to("#ar",{y:20,duration:0.5,repeat:4,yoyo:true,ease:"power1.inOut"},26.0)
.to(".comp",{opacity:0,duration:0.5},29.5);
window.__timelines=window.__timelines||{};window.__timelines["monthly"]=t;
})();
</script>
</body>
</html>
