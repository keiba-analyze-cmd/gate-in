<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;">
<div id="root"
     data-composition-id="test"
     data-start="0"
     data-duration="5"
     data-width="1080"
     data-height="1920"
     style="background:#0a0a0a;position:relative;font-family:sans-serif;width:1080px;height:1920px;">

  <div class="clip"
       data-start="0"
       data-duration="5"
       data-track-index="0"
       style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
    <div style="font-size:72px;font-weight:900;color:#DC2626;">🔥 カザン</div>
    <div style="font-size:36px;color:white;margin-top:20px;">テストレンダリング成功</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    var tl = gsap.timeline({ paused: true });
    tl.from("[data-track-index='0']", { opacity: 0, scale: 0.5, duration: 1, ease: "back.out(1.7)" }, 0);
    window.__timelines = window.__timelines || {};
    window.__timelines["test"] = tl;
  </script>
</div>
</body>
</html>
